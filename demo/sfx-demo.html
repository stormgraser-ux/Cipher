<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cipher — SFX Audition</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-deep: #06060c;
      --bg-surface: #0a0a14;
      --bg-raised: #10101c;
      --bg-input: #0e0e1a;
      --border: #1c1c30;
      --border-dim: #131326;
      --text-ghost: #2a2a44;
      --text-muted: #484860;
      --text-dim: #6a6a82;
      --text-base: #9898b0;
      --text-bright: #d0d0e0;
      --accent: #6e6eaa;
      --accent-mid: #8080c0;
      --accent-bright: #a898ee;
      --accent-glow: rgba(110, 110, 170, 0.12);
      --green: #4ade80;
      --green-glow: rgba(74, 222, 128, 0.3);
      --red: #f87171;
    }

    html, body {
      height: 100%;
      background: var(--bg-deep);
      font-family: 'IBM Plex Mono', 'Consolas', monospace;
      color: var(--text-base);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background:
        radial-gradient(ellipse at 25% 40%, rgba(110, 110, 170, 0.04) 0%, transparent 50%),
        radial-gradient(ellipse at 75% 60%, rgba(90, 60, 140, 0.03) 0%, transparent 50%),
        var(--bg-deep);
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.022;
      pointer-events: none;
      z-index: 100;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    /* ── Console panel ── */

    .console {
      width: 600px;
      max-width: 94vw;
      background: var(--bg-surface);
      border: 1px solid var(--border-dim);
      border-radius: 4px;
      overflow: hidden;
    }

    /* ── Header ── */

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 10px;
    }

    .header-left {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .logo {
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.25em;
      color: var(--accent);
    }

    .version {
      font-size: 10px;
      font-weight: 300;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .led {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-ghost);
      transition: all 0.4s ease;
    }

    .led.ready {
      background: var(--green);
      box-shadow: 0 0 10px var(--green-glow);
    }

    .state {
      font-size: 10px;
      font-weight: 400;
      color: var(--text-muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* ── Subtitle ── */

    .subtitle {
      padding: 0 20px 14px;
      font-size: 11px;
      font-weight: 300;
      color: var(--text-dim);
      letter-spacing: 0.06em;
    }

    /* ── Sliders ── */

    .sliders {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
      padding: 0 20px 18px;
    }

    .fader-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .fader-header label {
      font-size: 10px;
      font-weight: 400;
      color: var(--text-muted);
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .fader-value {
      font-size: 12px;
      font-weight: 400;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      background: linear-gradient(
        to right,
        var(--accent) 0%,
        var(--accent) var(--fill, 50%),
        var(--border-dim) var(--fill, 50%),
        var(--border-dim) 100%
      );
      border-radius: 2px;
      outline: none;
      cursor: pointer;
      font-size: 16px;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      background: var(--accent-mid);
      border: 2px solid var(--accent-bright);
      border-radius: 2px;
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      background: var(--accent-bright);
      box-shadow: 0 0 10px var(--accent-glow);
    }

    input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      background: var(--accent-mid);
      border: 2px solid var(--accent-bright);
      border-radius: 2px;
      cursor: pointer;
    }

    input[type="range"]::-moz-range-track {
      height: 4px;
      background: var(--border-dim);
      border-radius: 2px;
      border: none;
    }

    /* ── Preset grid ── */

    .group {
      padding: 0 20px 16px;
    }

    .group-label {
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-ghost);
      margin-bottom: 8px;
      padding-left: 2px;
    }

    .group-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 8px;
    }

    .sfx-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 12px;
      font-family: inherit;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      background: var(--bg-raised);
      border: 1px solid var(--border-dim);
      border-radius: 3px;
      cursor: pointer;
      transition: all 0.15s ease;
      text-transform: uppercase;
      user-select: none;
    }

    .sfx-btn:hover {
      border-color: var(--border);
      color: var(--text-bright);
    }

    .sfx-btn:active {
      transform: translateY(1px);
    }

    .sfx-btn.flash {
      border-color: var(--accent-bright);
      color: var(--accent-bright);
      box-shadow: 0 0 14px var(--accent-glow);
      background: rgba(110, 110, 170, 0.08);
    }

    .sfx-btn.loop-active {
      border-color: var(--green);
      color: var(--green);
      box-shadow: 0 0 14px var(--green-glow);
      background: rgba(74, 222, 128, 0.06);
    }

    /* ── Init overlay ── */

    .init-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(6, 6, 12, 0.85);
      z-index: 10;
      cursor: pointer;
      transition: opacity 0.3s ease;
    }

    .init-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .init-text {
      font-size: 11px;
      font-weight: 400;
      color: var(--text-muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* ── Footer ── */

    .footer {
      padding: 10px 20px;
      font-size: 9px;
      font-weight: 300;
      color: var(--text-ghost);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-top: 1px solid var(--border-dim);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .sep { color: var(--text-ghost); }

    .console { position: relative; }
  </style>
</head>
<body>
  <div class="console">
    <div class="init-overlay" id="init-overlay">
      <span class="init-text">Click to initialize audio</span>
    </div>

    <header class="header">
      <div class="header-left">
        <h1 class="logo">CIPHER</h1>
        <span class="version">sfx</span>
      </div>
      <div class="header-right">
        <span class="led" id="led"></span>
        <span class="state" id="state">IDLE</span>
      </div>
    </header>

    <div class="subtitle">18 synth presets &middot; pool-based &middot; zero latency</div>

    <div class="sliders">
      <div class="fader">
        <div class="fader-header">
          <label for="slider-pitch">Pitch</label>
          <span class="fader-value" id="val-pitch">0</span>
        </div>
        <input type="range" id="slider-pitch" min="-12" max="12" step="1" value="0">
      </div>
      <div class="fader">
        <div class="fader-header">
          <label for="slider-intensity">Intensity</label>
          <span class="fader-value" id="val-intensity">0.70</span>
        </div>
        <input type="range" id="slider-intensity" min="0" max="1" step="0.01" value="0.70">
      </div>
      <div class="fader">
        <div class="fader-header">
          <label for="slider-volume">Volume</label>
          <span class="fader-value" id="val-volume">0.70</span>
        </div>
        <input type="range" id="slider-volume" min="0" max="1" step="0.01" value="0.70">
      </div>
    </div>

    <div class="group">
      <div class="group-label">Impacts</div>
      <div class="group-grid">
        <button class="sfx-btn" data-sfx="hit">hit</button>
        <button class="sfx-btn" data-sfx="hit-light">hit-light</button>
        <button class="sfx-btn" data-sfx="explode">explode</button>
      </div>
    </div>

    <div class="group">
      <div class="group-label">Energy</div>
      <div class="group-grid">
        <button class="sfx-btn" data-sfx="zap">zap</button>
        <button class="sfx-btn" data-sfx="pickup">pickup</button>
        <button class="sfx-btn" data-sfx="powerup">powerup</button>
      </div>
    </div>

    <div class="group">
      <div class="group-label">UI</div>
      <div class="group-grid">
        <button class="sfx-btn" data-sfx="click">click</button>
        <button class="sfx-btn" data-sfx="error">error</button>
        <button class="sfx-btn" data-sfx="success">success</button>
      </div>
    </div>

    <div class="group">
      <div class="group-label">Ambient</div>
      <div class="group-grid">
        <button class="sfx-btn" data-sfx="chime">chime</button>
        <button class="sfx-btn" data-sfx="sparkle">sparkle</button>
        <button class="sfx-btn" data-sfx="whoosh">whoosh</button>
      </div>
    </div>

    <div class="group">
      <div class="group-label">TCB &mdash; Overcharged Rail</div>
      <div class="group-grid">
        <button class="sfx-btn" data-sfx="rail-lockin">rail-lockin</button>
        <button class="sfx-btn" data-sfx="rail-fire">rail-fire</button>
        <button class="sfx-btn" data-sfx="rail-pierce">rail-pierce</button>
      </div>
    </div>

    <div class="group">
      <div class="group-label">TCB &mdash; Rampage Evolution</div>
      <div class="group-grid">
        <button class="sfx-btn" data-sfx="rampage-tick">rampage-tick</button>
        <button class="sfx-btn" data-sfx="rampage-fire">rampage-fire</button>
        <button class="sfx-btn loop-toggle" data-loop="rampage-sustain">rampage-sustain</button>
      </div>
    </div>

    <footer class="footer">
      <span>tone.js</span>
      <span class="sep">&middot;</span>
      <span>web audio</span>
      <span class="sep">&middot;</span>
      <span>pool-based</span>
      <span class="sep">&middot;</span>
      <span>18 presets</span>
    </footer>
  </div>

  <script type="importmap">
  {
    "imports": {
      "tone": "https://esm.run/tone"
    }
  }
  </script>
  <script type="module">
    import * as Tone from "tone";
    import * as engine from "../src/core/engine.js";
    import { createMixer } from "../src/core/mixer.js";
    import { createSfxPlayer } from "../src/core/sfx.js";
    import { registerAll } from "../src/sfx/presets.js";

    /* ── DOM ── */
    const $ = (id) => document.getElementById(id);
    const overlay     = $("init-overlay");
    const ledEl       = $("led");
    const stateEl     = $("state");
    const sliderPitch = $("slider-pitch");
    const sliderInt   = $("slider-intensity");
    const sliderVol   = $("slider-volume");
    const valPitch    = $("val-pitch");
    const valInt      = $("val-intensity");
    const valVol      = $("val-volume");
    const buttons     = document.querySelectorAll(".sfx-btn");

    let sfx = null;

    /* ── Slider fill tracking ── */
    function updateFill(el) {
      const pct = ((el.value - el.min) / (el.max - el.min)) * 100;
      el.style.setProperty("--fill", `${pct}%`);
    }
    updateFill(sliderPitch);
    updateFill(sliderInt);
    updateFill(sliderVol);

    /* ── Init ── */
    overlay.addEventListener("click", async () => {
      stateEl.textContent = "INIT";
      try {
        await engine.init(140);
        const mixer = await createMixer();
        sfx = createSfxPlayer(mixer, { volume: -6 });
        registerAll(sfx);
        sfx.setVolume(parseFloat(sliderVol.value));

        ledEl.classList.add("ready");
        stateEl.textContent = "READY";
        overlay.classList.add("hidden");
      } catch (err) {
        console.error("SFX init failed:", err);
        stateEl.textContent = "ERROR";
      }
    });

    /* ── Button triggers (one-shots) ── */
    buttons.forEach((btn) => {
      btn.addEventListener("click", () => {
        if (!sfx) return;
        const name = btn.dataset.sfx;
        if (!name) return; // loop toggles handled below
        const opts = {
          pitch: parseInt(sliderPitch.value, 10),
          intensity: parseFloat(sliderInt.value),
        };
        sfx.play(name, opts);

        // Visual flash
        btn.classList.add("flash");
        setTimeout(() => btn.classList.remove("flash"), 150);
      });
    });

    /* ── Loop toggle buttons ── */
    const loopButtons = document.querySelectorAll(".loop-toggle");
    loopButtons.forEach((btn) => {
      btn.addEventListener("click", () => {
        if (!sfx) return;
        const name = btn.dataset.loop;
        if (sfx.isLooping(name)) {
          sfx.stopLoop(name);
          btn.classList.remove("loop-active");
        } else {
          sfx.startLoop(name, {
            pitch: parseInt(sliderPitch.value, 10),
            intensity: parseFloat(sliderInt.value),
          });
          btn.classList.add("loop-active");
        }
      });
    });

    /* ── Sliders ── */
    sliderPitch.addEventListener("input", (e) => {
      const v = parseInt(e.target.value, 10);
      valPitch.textContent = v > 0 ? `+${v}` : `${v}`;
      updateFill(e.target);
    });

    sliderInt.addEventListener("input", (e) => {
      valInt.textContent = parseFloat(e.target.value).toFixed(2);
      updateFill(e.target);
    });

    sliderVol.addEventListener("input", (e) => {
      const v = parseFloat(e.target.value);
      valVol.textContent = v.toFixed(2);
      updateFill(e.target);
      sfx?.setVolume(v);
    });

    /* ── Keyboard shortcuts: 1-9,0,-,= map to presets ── */
    const keyMap = {
      "1": "hit",
      "2": "hit-light",
      "3": "explode",
      "4": "zap",
      "5": "pickup",
      "6": "powerup",
      "7": "click",
      "8": "error",
      "9": "success",
      "0": "chime",
      "-": "sparkle",
      "=": "whoosh",
      "q": "rail-lockin",
      "w": "rail-fire",
      "e": "rail-pierce",
      "r": "rampage-tick",
      "t": "rampage-fire",
    };

    const loopKeyMap = {
      "y": "rampage-sustain",
    };

    document.addEventListener("keydown", (e) => {
      if (!sfx || e.target.tagName === "INPUT") return;

      // One-shot presets
      const name = keyMap[e.key];
      if (name) {
        e.preventDefault();
        sfx.play(name, {
          pitch: parseInt(sliderPitch.value, 10),
          intensity: parseFloat(sliderInt.value),
        });
        const btn = document.querySelector(`[data-sfx="${name}"]`);
        if (btn) {
          btn.classList.add("flash");
          setTimeout(() => btn.classList.remove("flash"), 150);
        }
        return;
      }

      // Loop toggles
      const loopName = loopKeyMap[e.key];
      if (loopName) {
        e.preventDefault();
        const btn = document.querySelector(`[data-loop="${loopName}"]`);
        if (sfx.isLooping(loopName)) {
          sfx.stopLoop(loopName);
          btn?.classList.remove("loop-active");
        } else {
          sfx.startLoop(loopName, {
            pitch: parseInt(sliderPitch.value, 10),
            intensity: parseFloat(sliderInt.value),
          });
          btn?.classList.add("loop-active");
        }
      }
    });
  </script>
</body>
</html>
